# Optional template. Copy this file to .github/workflows/deploy-web-client.yml
# when you are ready to deploy the static Hamlet web client with GitHub Pages.
# It is manual-only by default; add a push trigger after validating deployment.

name: Deploy Hamlet web client

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: "Public Hamlet API origin baked into the login screen"
        required: true
        default: "https://api.example.com"
      renderer_sentry_dsn:
        description: "Optional renderer-side Sentry DSN; leave blank to disable"
        required: false
        default: ""
  # To auto-deploy later, uncomment and adjust:
  # push:
  #   branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install dependencies
        working-directory: client
        run: npm ci
      - name: Run checks
        working-directory: client
        run: |
          npm run fmt:check
          npm run lint
          npm run typecheck
          npm run test
      - name: Build static renderer
        working-directory: client
        env:
          VITE_HAMLET_DEFAULT_SERVER_URL: ${{ inputs.api_url }}
          VITE_HAMLET_SENTRY_DSN: ${{ inputs.renderer_sentry_dsn }}
        run: npm run build:web
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
