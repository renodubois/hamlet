# Optional template. Copy this file to .github/workflows/deploy-web-client.yml
# when you are ready to deploy the static Hamlet web client with GitHub Pages.
# It is manual-only by default; add a push trigger after validating deployment.

name: Deploy Hamlet web client

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: "Public Hamlet API origin baked into the login screen"
        required: true
        default: "https://api.example.com"
      renderer_sentry_dsn:
        description: "Optional renderer-side Sentry DSN; leave blank to disable"
        required: false
        default: ""
  # To auto-deploy later, uncomment and adjust:
  # push:
  #   branches: [main]

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: 11.11.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.13.0
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: client
        run: pnpm install --frozen-lockfile
      - name: Run checks
        working-directory: client
        run: |
          pnpm run fmt:check
          pnpm run lint
          pnpm run check:native-react
          pnpm run typecheck
          pnpm run test
      - id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Build static renderer
        working-directory: client
        env:
          VITE_HAMLET_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          VITE_HAMLET_DEFAULT_SERVER_URL: ${{ inputs.api_url }}
          VITE_HAMLET_SENTRY_DSN: ${{ inputs.renderer_sentry_dsn }}
        run: pnpm run build:web
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
