services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: hamlet-server:dev
    environment:
      RUST_LOG: debug
      CARGO_TARGET_DIR: /app/target
    volumes:
      - .:/app
      - hamlet_target:/app/target
      - hamlet_cargo_registry:/usr/local/cargo/registry
      - hamlet_cargo_git:/usr/local/cargo/git

volumes:
  hamlet_target:
  hamlet_cargo_registry:
  hamlet_cargo_git:
