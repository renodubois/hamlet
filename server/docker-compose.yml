services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: hamlet-server:latest
    ports:
      - "${HAMLET_SERVER_PORT:-3030}:3030"
    environment:
      HAMLET_BIND_ADDR: 0.0.0.0:3030
      HAMLET_DATA_DIR: /var/lib/hamlet
      HAMLET_CONFIG_FILE: /var/lib/hamlet/server-config.json
      DATABASE_URL: "sqlite:///var/lib/hamlet/hamlet.db?mode=rwc"
      HAMLET_UPLOADS_DIR: /var/lib/hamlet/uploads
      HAMLET_MESSAGE_ATTACHMENTS_DIR: /var/lib/hamlet/private-uploads/message-attachments
      HAMLET_BOOTSTRAP_DEFAULT_CHANNELS: "true"
      HAMLET_SEED_DEV_DATA: "false"
      RUST_LOG: ${RUST_LOG:-info}
      LIVEKIT_URL: ${LIVEKIT_URL:-ws://127.0.0.1:7880}
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: devsecretdevsecretdevsecretdevsecret
    volumes:
      - hamlet_data:/var/lib/hamlet
    depends_on:
      - livekit
    restart: unless-stopped

  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    network_mode: host
    volumes:
      - type: bind
        source: ${HAMLET_LIVEKIT_CONFIG:-./livekit.yaml}
        target: /etc/livekit.yaml
        read_only: true
        bind:
          create_host_path: false
    restart: unless-stopped

volumes:
  hamlet_data:
