services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: hamlet-server:latest
    ports:
      - "${HAMLET_SERVER_PORT:-3030}:3030"
    environment:
      HAMLET_BIND_ADDR: 0.0.0.0:3030
      RUST_LOG: ${RUST_LOG:-info}
      LIVEKIT_URL: ${LIVEKIT_URL:-ws://127.0.0.1:7880}
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: devsecretdevsecretdevsecretdevsecret
    volumes:
      - hamlet_uploads:/app/uploads
    depends_on:
      - livekit
    restart: unless-stopped

  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    network_mode: host
    volumes:
      - ${HAMLET_LIVEKIT_CONFIG:-./livekit.yaml}:/etc/livekit.yaml:ro
    restart: unless-stopped

volumes:
  hamlet_uploads:
