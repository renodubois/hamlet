name: Deploy Hamlet web client

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: "Public Hamlet API origin baked into the login screen"
        required: true
        default: "https://api.hamlet.chat"
      renderer_sentry_dsn:
        description: "Optional renderer-side Sentry DSN; leave blank to disable"
        required: false
        default: "https://60c6e628bcadb37f23e2356423103d85@o4511678358880256.ingest.us.sentry.io/4511678668734464"
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install dependencies
        working-directory: client
        run: npm ci
      - name: Run checks
        working-directory: client
        run: |
          npm run fmt:check
          npm run lint
          npm run typecheck
          npm run test
      - name: Build static renderer
        working-directory: client
        env:
          HAMLET_BUILD_SOURCE_MAPS: "true"
          VITE_HAMLET_DEFAULT_SERVER_URL: ${{ inputs.api_url }}
          VITE_HAMLET_SENTRY_DSN: ${{ inputs.renderer_sentry_dsn }}
        run: npm run build:web
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
